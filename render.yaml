services:
  - type: web
    name: taskflow-api
    env: docker
    dockerfilePath: server/Dockerfile
    dockerContext: server
    plan: free
    region: oregon
    envVars:
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false # User will provide their MongoDB Atlas URI
      - key: CLIENT_URL
        sync: false # User will provide their Vercel frontend URL (for CORS)
